<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Любимые литературные герои</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="main-page" class="page active">
    <div class="container">
        <div class="content">

            <h1 class="title">Любимые литературные герои</h1>

            <p class="subtitle">
                Добро пожаловать на сайт Радомира, Тимофея и Альмира.<br>
                Выберите героя:
            </p>
            <div class="buttons" id="main-buttons">
                <button onclick="showHero(0)" class="btn hero-btn">
                    Радомир
                </button>

                <button onclick="showHero(1)" class="btn hero-btn">
                    Тимофей
                </button>

                <button onclick="showAlmirHeroes()" class="btn hero-btn">
                    Альмир
                </button>
            </div>
            <div class="buttons hidden" id="almir-buttons">

                <button onclick="showHero(2)" class="btn hero-btn">
                    Монки Д. Луффи
                </button>

                <button onclick="showHero(3)" class="btn hero-btn">
                    Юрий Гречкин
                </button>

                <button onclick="backToMain()" class="btn back-small">
                    ← Назад
                </button>

            </div>

        </div>
    </div>
</div>

<!-- Страница героя -->
<div id="hero-page" class="page">
    <div class="container">

        <button onclick="goBack()" class="back-btn">
            ← Назад
        </button>

        <div class="card">

            <div class="hero-info">

                <h2 id="hero-name" class="hero-name"></h2>

                <p id="hero-owner" class="owner"></p>

                <img id="hero-image" class="hero-img" alt="Герой">

                <p id="hero-work" class="work"></p>

                <p id="hero-description" class="description"></p>

            </div>

        </div>

        <footer class="footer">
            © 2026 LunguerS aka Радомир
        </footer>

    </div>
</div>

<script src="script.js"></script>
</body>
</html>
