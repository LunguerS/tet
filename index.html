<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Любимые литературные герои</title>

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body>

<!-- Главная страница -->
<div id="main-page" class="page active">
    <div class="container">
        <div class="content">
            <h1 class="title">Любимые литературные герои</h1>

            <p class="subtitle">
                Добро пожаловать на сайт Радомира и Тимофея.<br>
                Выберите героя:
            </p>

            <div class="buttons">
                <button onclick="showHero(0)" class="btn">Радомир</button>
                <button onclick="showHero(1)" class="btn">Тимофей</button>
            </div>
        </div>
    </div>
</div>

<!-- Страница героя -->
<div id="hero-page" class="page">
    <div class="container">
        <button onclick="goBack()" class="back-btn">
            <i class="fas fa-arrow-left"></i> Назад
        </button>

        <div id="hero-content" class="card">
            <div class="hero-info">
                <h2 id="hero-name" class="hero-name"></h2>
                <p id="hero-owner" class="owner"></p>

                <div class="image-container">
                    <img id="hero-image" class="hero-img" alt="Герой" onclick="openModal()">
                    <div class="image-overlay">
                        <i class="fas fa-search-plus"></i>
                    </div>
                </div>

                <p id="hero-work" class="work"></p>
                <p id="hero-description" class="description"></p>

                <div class="actions">
                    <button onclick="toggleLike()" id="like-btn" class="like-btn">
                        <i class="fas fa-heart"></i>
                        <span id="like-count">0</span>
                    </button>

                    <a id="hero-link" href="#" target="_blank" class="summary-btn">
                        Краткое содержание
                    </a>
                </div>
            </div>
        </div>

        <footer class="footer">
            © 2026 LunguerS aka Радомир
        </footer>
    </div>
</div>

<!-- Модальное окно для изображения -->
<div id="image-modal" class="modal">
    <div class="modal-content">
        <button class="modal-close" onclick="closeModal()">×</button>
        <img id="modal-image" class="modal-img" alt="Герой">
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
